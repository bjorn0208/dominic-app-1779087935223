<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Performance SaaS B2B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0F172A;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #38BDF8 0%, #818CF8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        .bento-item {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .bento-item:hover {
            transform: translateY(-5px);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        .timeline-line {
            background: linear-gradient(to bottom, #38BDF8, #818CF8, transparent);
        }
    </style>
</head>
<body class="text-slate-200 antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'bg-[#0F172A]/80 backdrop-blur-lg border-b border-white/10 py-3' : 'py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center">
                                <span className="material-symbols-outlined text-white text-xl">bolt</span>
                            </div>
                            <span className="text-xl font-bold tracking-tight text-white">NEXUS</span>
                        </div>
                        
                        <div className="hidden md:flex items-center gap-8 text-sm font-medium text-slate-400">
                            <a href="#features" className="hover:text-sky-400 transition-colors">Recursos</a>
                            <a href="#process" className="hover:text-sky-400 transition-colors">Processo</a>
                            <a href="#faq" className="hover:text-sky-400 transition-colors">FAQ</a>
                            <a href="#pricing" className="hover:text-sky-400 transition-colors">Preços</a>
                        </div>

                        <button className="bg-sky-500 text-white px-6 py-2.5 rounded-full text-sm font-semibold btn-glow transition-all active:scale-95 shadow-lg shadow-sky-500/20">
                            Começar Grátis
                        </button>
                    </div>
                </nav>
            );
        };

        const Hero = () => (
            <section className="relative pt-32 pb-20 overflow-hidden px-6">
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[1000px] h-[600px] bg-sky-500/10 blur-[120px] rounded-full -z-10"></div>
                <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
                    <div className="space-y-8">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-sky-500/30 bg-sky-500/10 text-sky-400 text-xs font-bold tracking-wider uppercase">
                            <span className="flex h-2 w-2 rounded-full bg-sky-400 animate-pulse"></span>
                            Eleito #1 em Eficiência Operacional 2024
                        </div>
                        <h1 className="text-5xl md:text-7xl font-extrabold text-white leading-[1.1] tracking-tight">

                        </h1>
                        <p className="text-lg md:text-xl text-slate-400 max-w-xl leading-relaxed">

                            </button>

                                    </div>
                                ))}
                            </div>

                                <p className="text-white font-bold">+12,000 usuários</p>

                                    <div className="flex gap-1.5">

                                        <div className="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                                        <div className="w-3 h-3 rounded-full bg-green-500/50"></div>
                                    </div>

                                <span className="material-symbols-outlined text-indigo-400 text-2xl">security</span>
                            </div>
                            <h3 className="text-xl font-bold text-white mb-2">Segurança Enterprise</h3>

                        <div className="flex-1 flex items-center justify-center">
                            <div className="relative">

                            </div>
                        </div>
                    </div>

                    <div className="glass-card rounded-3xl p-8 bento-item group">
                        <div className="w-12 h-12 bg-emerald-500/20 rounded-2xl flex items-center justify-center mb-6">
                            <span className="material-symbols-outlined text-emerald-400 text-2xl">api</span>
                        </div>
                        <h3 className="text-xl font-bold text-white mb-2">API First</h3>
                        <p className="text-sm text-slate-400">Integre em minutos com documentação Swagger clara.</p>
                    </div>

                    <div className="glass-card rounded-3xl p-8 bento-item group">
                        <div className="w-12 h-12 bg-amber-500/20 rounded-2xl flex items-center justify-center mb-6">
                            <span className="material-symbols-outlined text-amber-400 text-2xl">hub</span>
                        </div>
                        <h3 className="text-xl font-bold text-white mb-2">Multi-Cloud</h3>
                        <p className="text-sm text-slate-400">AWS, Azure e GCP trabalhando em harmonia.</p>
                    </div>
                </div>
            </section>
        );

        const ProcessSection = () => (
            <section id="process" className="py-24 px-6 relative bg-slate-900/50">
                <div className="max-w-7xl mx-auto">
                    <div className="grid lg:grid-cols-2 gap-16 items-center">
                        <div>
                            <h2 className="text-3xl md:text-5xl font-extrabold text-white mb-8">Fluxo de <span className="gradient-text">Sucesso.</span></h2>
                            <div className="space-y-12 relative">
                                <div className="absolute left-6 top-2 bottom-2 w-0.5 bg-white/10">
                                    <div className="w-full h-1/2 timeline-line"></div>
                                </div>
                                
                                {[
                                    { step: '01', title: 'Conecte seus Dados', desc: 'Sincronize suas fontes em segundos com nossos conectores prontos.', icon: 'sync' },
                                    { step: '02', title: 'IA em Ação', desc: 'Nossos modelos processam bilhões de pontos de dados para encontrar insights.', icon: 'psychology' },
                                    { step: '03', title: 'Decisões Inteligentes', desc: 'Receba recomendações acionáveis diretamente no seu dashboard.', icon: 'auto_awesome' }

                                    <div key={idx} className="relative pl-16 group">
                                        <div className="absolute left-0 w-12 h-12 rounded-xl bg-slate-800 border border-white/10 flex items-center justify-center text-sky-400 font-bold z-10 group-hover:border-sky-500 transition-colors">

                                        </div>
                                        <h4 className="text-xl font-bold text-white mb-2">{item.title}</h4>
                                        <p className="text-slate-400 max-w-md">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="glass-card rounded-3xl p-2">
                             <div className="bg-[#0F172A] rounded-2xl p-8 border border-white/5 overflow-hidden">
                                <div className="space-y-6">
                                    <div className="flex items-center justify-between">
                                        <span className="text-xs text-slate-500 font-mono">LOG_ANALYZER_ACTIVE</span>
                                        <span className="h-2 w-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></span>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="h-2 bg-sky-500/20 rounded w-full"></div>
                                        <div className="h-2 bg-sky-500/20 rounded w-5/6"></div>
                                        <div className="h-2 bg-sky-500/20 rounded w-4/6"></div>
                                        <div className="h-2 bg-white/5 rounded w-full"></div>
                                    </div>
                                    <div className="pt-4 flex gap-4">
                                        <div className="flex-1 h-32 rounded-xl border border-white/5 bg-white/5 flex flex-col items-center justify-center text-center p-4">
                                            <span className="text-2xl font-bold text-sky-400">99.9%</span>
                                            <span className="text-[10px] text-slate-500">UPTIME</span>
                                        </div>
                                        <div className="flex-1 h-32 rounded-xl border border-white/5 bg-white/5 flex flex-col items-center justify-center text-center p-4">
                                            <span className="text-2xl font-bold text-indigo-400">0.02s</span>
                                            <span className="text-[10px] text-slate-500">LATENCY</span>
                                        </div>
                                    </div>
                                </div>
                             </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const FAQItem = ({ question, answer }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="border-b border-white/10">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full py-6 flex items-center justify-between text-left hover:text-sky-400 transition-colors"
                    >
                        <span className="text-lg font-semibold text-white">{question}</span>
                        <span className={`material-symbols-outlined transition-transform duration-300 ${isOpen ? 'rotate-180 text-sky-400' : ''}`}>expand_more</span>
                    </button>
                    <div className={`overflow-hidden transition-all duration-300 ${isOpen ? 'max-h-48 opacity-100 pb-6' : 'max-h-0 opacity-0'}`}>
                        <p className="text-slate-400 leading-relaxed">{answer}</p>
                    </div>
                </div>
            );
        };

        const Footer = () => (
            <footer className="pt-24 pb-12 px-6">
                <div className="max-w-7xl mx-auto">
                    <div className="glass-card rounded-[40px] p-12 md:p-24 text-center relative overflow-hidden mb-24">
                        <div className="absolute -top-24 -left-24 w-64 h-64 bg-sky-500/20 blur-[100px] rounded-full"></div>
                        <div className="absolute -bottom-24 -right-24 w-64 h-64 bg-indigo-500/20 blur-[100px] rounded-full"></div>
                        
                        <h2 className="text-4xl md:text-6xl font-extrabold text-white mb-8 relative">
                            Pronto para acelerar seu <span className="gradient-text">próximo nível?</span>
                        </h2>
                        <p className="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto mb-12 relative">

                        </p>
                        <div className="flex flex-col md:flex-row items-center justify-center gap-4 max-w-md mx-auto relative">

                                type="email" 
                                placeholder="Seu e-mail corporativo" 
                                className="w-full px-6 py-4 rounded-xl bg-[#0F172A] border border-white/10 text-white focus:outline-none focus:border-sky-500 transition-colors"

                            <button className="w-full md:w-auto whitespace-nowrap bg-sky-500 text-white px-8 py-4 rounded-xl font-bold btn-glow shadow-lg shadow-sky-500/20 active:scale-95 transition-all">

                        <div>

                            <ul className="space-y-2 text-sm text-slate-500">
                                <li><a href="#" className="hover:text-sky-400 transition-colors">Documentação</a></li>
                                <li><a href="#" className="hover:text-sky-400 transition-colors">API Reference</a></li>
                                <li><a href="#" className="hover:text-sky-400 transition-colors">Comunidade</a></li>
                                <li><a href="#" className="hover:text-sky-400 transition-colors">Blog</a></li>

                        </div>
